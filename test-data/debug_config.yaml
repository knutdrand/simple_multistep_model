# Minimal RunConfig used by the test suite.
#
# - feature_columns matches the columns actually present in the bundled
#   training/historic/future CSVs (no mean_relative_humidity).
# - RandomForest knobs are deliberately tiny so the train/predict tests
#   stay fast.
# - use_residual_bucketing=true so prediction samples are clamped to >= 0
#   (the skpro path used when False does not clamp).
target_variable: disease_cases
feature_columns:
  - rainfall
  - mean_temperature

n_target_lags: 6
n_samples: 20

feature_min_lag: 1
feature_max_lag: 3

use_residual_bucketing: true
min_bucket_size: 3

rf:
  n_estimators: 5
  max_depth: 3
  min_samples_leaf: 2
  max_features: sqrt
  random_state: 0
